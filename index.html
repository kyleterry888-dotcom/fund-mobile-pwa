<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="基金估值" />
  <title>基金估值助手 Mobile</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell" id="top">
    <header class="mobile-hero">
      <div class="hero-copy">
        <p class="eyebrow">Fund Valuation PWA</p>
        <h1>基金估值助手</h1>
        <p class="subtitle">手机自用版，本地保存持仓，用公开接口刷新估值和重仓贡献。</p>
      </div>
      <button id="refreshAllBtn" class="primary hero-refresh">刷新全部</button>
    </header>

    <section id="installTip" class="install-tip card hidden">
      <div>
        <strong>可以添加到手机桌面</strong>
        <p>iPhone 用 Safari 打开后：分享 → 添加到主屏幕。安卓可直接点安装。</p>
      </div>
      <div class="install-actions">
        <button id="installBtn" class="primary">安装</button>
        <button id="closeInstallTip" class="ghost">不提醒</button>
      </div>
    </section>

    <section id="summaryGrid" class="summary-grid"></section>

    <section id="addSection" class="card quick-add-card">
      <div class="section-title-row compact-title">
        <div>
          <h2>添加基金</h2>
          <p>输入 6 位基金代码，也可以一键加入示例基金。</p>
        </div>
      </div>
      <div class="field grow">
        <label for="fundCodeInput">基金代码</label>
        <div class="inline-input">
          <input id="fundCodeInput" placeholder="例如 024500 / 001958" autocomplete="off" inputmode="numeric" />
          <button id="addFundBtn">添加</button>
        </div>
      </div>
      <div class="quick-actions">
        <button id="addSampleBtn">加入示例基金</button>
        <button data-scroll="#settingsSection">设置与备份</button>
      </div>
    </section>

    <section id="fundSection" class="card table-card">
      <div class="section-title-row">
        <div>
          <h2>基金列表</h2>
          <p id="statusText">尚未刷新</p>
        </div>
        <div class="legend">
          <span><i class="dot up"></i>上涨</span>
          <span><i class="dot down"></i>下跌</span>
          <span><i class="dot flat"></i>无数据</span>
        </div>
      </div>
      <div id="fundList" class="fund-list empty-list">暂无基金。可以先点“加入示例基金”。</div>
    </section>

    <section id="settingsSection" class="toolbar card settings-card">
      <div class="section-title-row compact-title full-row">
        <div>
          <h2>设置与备份</h2>
          <p>自动刷新只刷新行情；重仓列表建议手动点“刷新全部”。</p>
        </div>
      </div>

      <div class="field small">
        <label for="refreshSecondsInput">刷新间隔</label>
        <select id="refreshSecondsInput">
          <option value="0">手动</option>
          <option value="30">30 秒</option>
          <option value="60">60 秒</option>
          <option value="120">120 秒</option>
          <option value="300">300 秒</option>
        </select>
      </div>

      <div class="field medium">
        <label for="valuationModeSelect">估值口径</label>
        <select id="valuationModeSelect">
          <option value="auto">自动：平台优先</option>
          <option value="platform">平台估值</option>
          <option value="top10_contribution">Top10 贡献</option>
          <option value="top10_proxy">Top10 归一化</option>
        </select>
      </div>

      <div class="toolbar-buttons">
        <button id="exportBtn">导出备份</button>
        <label class="file-button">
          导入备份
          <input id="importFile" type="file" accept="application/json" hidden />
        </label>
      </div>
    </section>
  </div>

  <nav class="bottom-nav" aria-label="手机底部导航">
    <button class="active" data-scroll="#top">首页</button>
    <button data-scroll="#addSection">添加</button>
    <button data-scroll="#fundSection">列表</button>
    <button data-scroll="#settingsSection">设置</button>
  </nav>

  <dialog id="manualDialog" class="manual-dialog">
    <form method="dialog">
      <div class="dialog-head">
        <div>
          <h3>手动重仓 JSON</h3>
          <p id="manualDialogSub">自动重仓不准时，可粘贴季报整理后的持仓。</p>
        </div>
        <button value="cancel" class="icon-btn" title="关闭">×</button>
      </div>
      <textarea id="manualHoldingsInput" spellcheck="false"></textarea>
      <div class="dialog-actions">
        <button id="clearManualBtn" value="clear" type="button">清空</button>
        <span class="spacer"></span>
        <button value="cancel">取消</button>
        <button id="saveManualBtn" value="default" class="primary" type="button">保存</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
